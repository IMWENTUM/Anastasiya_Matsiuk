<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <link rel="stylesheet" href="css/reset.css">
    <link rel="stylesheet" href="css/normalize.css">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/media.css">

    <title>MAKET_FORM</title>
</head>
<body>
    <div class="forms">
        <p class="preface">Для публикации вашей статьи заполните, пожалуйста, следующую форму:</p>
        <form action="TestForm.php" method="post">
            <table class="table">
                
                <tr class="article">
                    <td>Название статьи:</td>
                    <td><input class="text_item" type="text"></td>
                </tr>
                
                <tr>
                    <td>Рубрика:</td>
                    <td><select name="category">
                        <option value="1">компьютерная техника</option>
                        <option value="2">графика и дизайн</option>
                        <option value="3">программирование</option>
                    </select></td>
                </tr>
                
                <tr>
                    <td>Публикация:</td>
                    <td>
                        <input type="radio"><span class="syte">на сайте</span>
                        <input type="radio"><span class="magazin">в журнале</span>
                        <input type="radio"><span class="double">на сайте и в журнале</span>
                    </td>
                </tr>

                <tr>
                    <td>Разрешить комментарии:</td>
                    <td><input class="comment" type="checkbox" name="comment" checked></td>
                </tr>
                
                <tr>
                    <td colspan="2">Текст статьи:<br>
                    <textarea class="massage" name="massage"></textarea>
                    </td>
                </tr>
                <tr>
                    <td><input class="push" type='submit' value='Опубликовать'></td>
                </tr>
            </table>
        </form>
    </div>
</body>
</html>
